<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <!-- BIS / ISI Mark -->
  <circle cx="60" cy="60" r="57" fill="#8B0000"/>
  <circle cx="60" cy="60" r="52" fill="none" stroke="white" stroke-width="2.5"/>
  <circle cx="60" cy="60" r="45" fill="none" stroke="#ffccaa" stroke-width="0.8" stroke-dasharray="4 3"/>
  <!-- IS text top arc feel -->
  <text x="60" y="42" text-anchor="middle" fill="#ffdddd" font-size="11" font-weight="700" font-family="Georgia,serif" letter-spacing="4">BUREAU OF</text>
  <!-- ISI large -->
  <text x="60" y="70" text-anchor="middle" fill="white" font-size="30" font-weight="900" font-family="Georgia,serif" letter-spacing="2">ISI</text>
  <!-- bottom label -->
  <text x="60" y="88" text-anchor="middle" fill="#ffdddd" font-size="9.5" font-weight="700" font-family="Arial,sans-serif" letter-spacing="3">STANDARDS</text>
</svg>
